{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BWSL | Premium Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-cyan: #00e5ff;
            --bg-dark: #0a0f1a;
        }

        body {
            background-color: var(--bg-dark);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-container {
            position: relative;
            width: 550px;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .animated-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            padding: 2px;
            background: conic-gradient(from 0deg, transparent 30%, var(--primary-cyan));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 15px), #fff calc(100% - 14px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 15px), #fff calc(100% - 14px));
            animation: rotate-premium 4s linear infinite;
            filter: drop-shadow(0 0 15px var(--primary-cyan));
            z-index: 1;
        }

        .static-dots {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            z-index: 0;
        }

        @keyframes rotate-premium {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-box {
            position: relative;
            z-index: 10;
            width: 380px;
            padding: 40px;
            background: rgba(10, 15, 26, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            text-align: center;
        }

        .login-box h2 {
            color: #fff;
            font-weight: 600;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--primary-cyan);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .form-control {
            background: transparent !important;
            border: none;
            color: #fff !important;
            padding: 12px 25px;
        }

        .form-control:focus {
            background: transparent;
            box-shadow: none;
        }

        /* প্লেসহোল্ডার টেক্সট উজ্জ্বল করার জন্য নতুন CSS */
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
            opacity: 1;
        }

        .btn-login {
            background: var(--primary-cyan);
            color: #000;
            border: none;
            border-radius: 50px;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.02);
            background: #00ffff;
        }

        .links {
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
        }

        .signup-link {
            color: var(--primary-cyan) !important;
            font-weight: bold;
        }

        .header-icons {
            position: absolute;
            top: 20px;
            right: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.4rem;
        }
        .header-icons i { margin-left: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-icons">
        <i class="bi bi-search"></i>
        <i class="bi bi-person-circle"></i>
    </div>

    <div class="login-container">
        <div class="static-dots"></div>
        <div class="animated-ring"></div>

        <div class="login-box">
            <h2>Login</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>
                <div class="input-group" style="border-color: var(--primary-cyan);">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <div class="links">
                    <a href="#">Forgot your password?</a>
                </div>
                <button type="submit" class="btn btn-login">Login</button>
                <div class="links">
                    <a href="#" class="signup-link">Signup</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
