{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BWSL | Payment Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body { 
            background-color: #ffffff; 
            color: #000000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        body::before {
            content: "";
            background-image: url("{% static 'images/logo.png' %}");
            background-repeat: no-repeat;
            background-position: center bottom 20%;
            background-size: 25%;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.05;
        }

        .top-nav {
            margin-bottom: -30px; /* মার্জিন কমানো হয়েছে যাতে কন্টেন্ট উপরে ওঠে */
            z-index: 2;
        }

        .back-link {
            text-decoration: none;
            color: #000;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            flex-grow: 1;
            padding-top: -10px; /* এটি আপনার প্রয়োজনমতো কমিয়ে বাড়িয়ে উচ্চতা ঠিক করতে পারবেন */
        }

        .entry-card {
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 1;
        }

        .form-label { font-weight: 600; color: #444; font-size: 0.9rem; }

        .form-control, .form-select {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #ff1744;
            box-shadow: none;
            background-color: #fff8f8;
        }

        .btn-submit {
            background-color: #ff1744;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        .btn-submit:hover { background-color: #d50000; transform: translateY(-2px); }

        .icon-circle {
            width: 60px;
            height: 60px;
            background-color: #fff0f0;
            color: #ff1744;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.5rem;
            border: 2px solid #ff1744;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="{% url 'index' %}" class="back-link">
            <i class="bi bi-arrow-left-circle-fill fs-5"></i> Back to Dashboard
        </a>
    </nav>

    <div class="main-container">
        <div class="entry-card text-center">
            <div class="icon-circle">
                <i class="bi bi-dash-lg"></i>
            </div>
            <h4 class="fw-bold mb-1">Payment Entry (Debit)</h4>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show mt-3 mb-0" role="alert" style="font-size: 0.85rem; border-radius: 10px;">
                        <i class="bi {% if message.tags == 'success' %}bi-check-circle-fill{% else %}bi-exclamation-triangle-fill{% endif %} me-2"></i>
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            
            <p class="text-muted small mb-4 mt-3">নতুন পেমেন্ট এন্ট্রি করার জন্য নিচের ফরমটি পূরণ করুন</p>

            <form method="POST" class="text-start">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" max="9999-12-31" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Purpose</label>
                    <select name="purpose" class="form-select" required style="cursor: pointer;">
                        <option value="" disabled selected>Select your purpose</option>
                        {% for p in purposes %}
                            <option value="{{ p.name }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Payment Amount</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">৳</span>
                        <input type="number" name="amount" class="form-control border-start-0" placeholder="0.00" step="0.01" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Remarks</label>
                    <textarea name="remarks" class="form-control" rows="2" placeholder="Enter your remarks..." style="border-radius: 10px;"></textarea>
                </div>

                <button type="submit" class="btn btn-submit">
                    <i class="bi bi-check2-circle me-2"></i> Confirm Payment
                </button>

                <div class="text-center mt-3">
                    <a href="{% url 'index' %}" class="text-decoration-none text-muted small">
                        <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
